name: CI

on:
  push:
  pull_request:

jobs:
  build-and-e2e:
    name: Apache 2.4 portability E2E and release artifact
    runs-on: ubuntu-22.04
    env:
      APACHE_HTTPD: /usr/sbin/apache2
      APXS_EXECUTABLE: /usr/bin/apxs
      BUILD_DIR: ${{ github.workspace }}/build/saas
      BUILD_JOBS: "2"
      SIGNAL_SYNTH_CLI: ${{ github.workspace }}/build/core/signal-synth
      SYN_SIG_RA_E2E_LOAD_MODULES: mpm_prefork_module=/usr/lib/apache2/modules/mod_mpm_prefork.so authn_core_module=/usr/lib/apache2/modules/mod_authn_core.so authz_core_module=/usr/lib/apache2/modules/mod_authz_core.so
      SYN_SIG_RA_E2E_LOCATION_ACCESS: Require all granted
    steps:
      - name: Check out SaaS
        uses: actions/checkout@v5
        with:
          path: signal_synth_saas

      - name: Resolve pinned core commit
        id: core-pin
        shell: bash
        run: |
          commit="$(sed -n 's/^[[:space:]]*"\([0-9a-f]\{40\}\)"[[:space:]]*$/\1/p' signal_synth_saas/CMakeLists.txt | head -n 1)"
          test -n "$commit"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Check out pinned core
        uses: actions/checkout@v5
        with:
          repository: tamask1s/signal_synth
          ref: ${{ steps.core-pin.outputs.commit }}
          path: signal_synth

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-dev libcurl4-openssl-dev libjansson-dev libsqlite3-dev nodejs python3 zip unzip

      - name: Build pinned core CLI
        run: |
          cmake -S signal_synth -B build/core -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG" -DSIGNAL_SYNTH_BUILD_TESTS=OFF -DSIGNAL_SYNTH_BUILD_CLI=ON
          cmake --build build/core --target signal_synth_cli -j2

      - name: Build, test, and run Apache E2E
        working-directory: signal_synth_saas
        env:
          RUN_E2E: "1"
        run: scripts/build_release.sh

      - name: Validate release workflow scripts
        working-directory: signal_synth_saas
        run: |
          sh -n scripts/build_release_artifact.sh scripts/verify_release_artifact.sh scripts/release_runtime.sh scripts/prune_release_history.sh scripts/deploy_live.sh
          bash -n scripts/deploy_release.sh scripts/rollback_live.sh

      - name: Build checksummed Apache 2.4 portability artifact
        working-directory: signal_synth_saas
        env:
          SYN_SIG_RA_SKIP_BUILD: "1"
        run: scripts/build_release_artifact.sh

      - name: Upload portability release artifact
        uses: actions/upload-artifact@v7
        with:
          name: synsigra-apache24-${{ github.sha }}
          path: |
            signal_synth_saas/build/releases/*.tar.gz
            signal_synth_saas/build/releases/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
