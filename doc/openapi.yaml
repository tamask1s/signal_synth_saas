        '200': {description: Core pack-analysis preview, including scoreable/reference-only targets and size estimates}
        '422': {description: Scenario JSON failed core validation}
  /v1/authoring/curated-scenarios/{pack_id}/{case_id}:
    get:
      summary: Clone a curated scenario into the draft editor
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: pack_id, required: true, schema: {type: string}}
        - {in: path, name: case_id, required: true, schema: {type: string}}
      responses:
        '200': {description: Curated scenario JSON}
        '404': {description: Pack/case not found}
  /v1/auth/register:
    post:
      summary: Create an account and send an ownership-verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name, accept_terms, terms_version]
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 12, maxLength: 128}
                display_name: {type: string, minLength: 1, maxLength: 100}
                accept_terms:
                  type: boolean
                  description: Must be true.
                terms_version:
                  type: string
                  enum: [private-beta-2026-07-17-r4]
              additionalProperties: false
      responses:
        '202': {description: Verification required or generic accepted response}
        '400': {description: Invalid account request or current terms were not accepted}
        '503': {description: Transactional email delivery is not configured or temporarily unavailable}
  /v1/auth/verify-email:
    post:
      summary: Verify email ownership and start a browser session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: {type: string, maxLength: 512}
              additionalProperties: false
      responses:
        '200': {description: Verified and signed in, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '400': {description: Invalid or expired single-use token}
        '429': {description: Too many token submissions}
  /v1/auth/resend-verification:
    post:
      summary: Request another email-verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string, format: email}
              additionalProperties: false
      responses:
        '202': {description: Generic accepted response independent of account eligibility}
        '503': {description: Transactional email delivery is unavailable}
  /v1/auth/password-reset/request:
    post:
      summary: Request a forgotten-password email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string, format: email}
              additionalProperties: false
      responses:
        '202': {description: Generic accepted response independent of account existence}
        '503': {description: Transactional email delivery is unavailable}
  /v1/auth/password-reset/complete:
    post:
      summary: Consume a reset token, change password, and start a browser session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: {type: string, maxLength: 512}
                password: {type: string, minLength: 12, maxLength: 128}
              additionalProperties: false
      responses:
        '200': {description: Password changed and signed in, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '400': {description: Invalid or expired single-use token or invalid password}
        '429': {description: Too many token submissions}
  /v1/auth/login:
    post:
      summary: Start a browser session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string}
              additionalProperties: false
      responses:
        '200': {description: Signed in, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '401': {description: Invalid email or password}
        '403': {description: Email ownership is not verified}
  /v1/auth/me:
    get:
      summary: Current browser account
      security: [{cookieAuth: []}]
      responses:
        '200': {description: Current account, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '401': {description: No valid browser session}
  /v1/auth/logout:
    post:
      summary: End the browser session
      security: [{cookieAuth: []}]
      responses:
        '200': {description: Signed out}
  /v1/account:
    patch:
      summary: Update the signed-in user's display name
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties:
                display_name: {type: string, minLength: 1, maxLength: 100}
              additionalProperties: false
      responses:
        '200': {description: Updated account, content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '400': {description: Invalid display name}
    delete:
      summary: Permanently delete the owner account and its single-member workspace
      description: Requires the current password and exact destructive confirmation. Server-side projects, jobs, packages, scenarios, custom packs, sessions, API keys, legal records, and identifiable audit/security records are removed. Only an anonymous deletion receipt remains. Previously downloaded artifacts cannot be revoked.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, confirmation]
              properties:
                current_password: {type: string, maxLength: 128}
                confirmation: {type: string, enum: [DELETE MY ACCOUNT]}
              additionalProperties: false
      responses:
        '200': {description: Account and workspace deleted, content: {application/json: {schema: {$ref: '#/components/schemas/AccountDeletion'}}}}
        '401': {description: Current password is incorrect}
        '403': {description: Workspace owner role required}
        '409': {description: Workspace has other members or a job is running}
  /v1/account/password:
    post:
      summary: Change password and invalidate all prior browser sessions
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: {type: string, maxLength: 128}
                new_password: {type: string, minLength: 12, maxLength: 128}
              additionalProperties: false
      responses:
        '200': {description: Password changed; cookie clients receive a replacement session}
        '400': {description: Invalid or unchanged password}
        '401': {description: Current password is incorrect}
  /v1/account/export:
    get:
      summary: Download a complete JSON account and workspace export without secrets
      description: Includes profile, projects, current and soft-deleted job metadata, scenarios, custom packs, API-key metadata, legal acceptances, audit history, and deletion-retention behavior. Password credentials, key hashes/secrets, session tokens, and email-action tokens are excluded.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200':
          description: Account export attachment
          content:
            application/json:
              schema: {type: object, additionalProperties: true}
  /v1/projects:
    get:
      summary: List caller organization projects
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Project list}
        '401': {description: Unauthorized, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
    post:
      summary: Create project (owner/admin)
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties: {display_name: {type: string, maxLength: 100}}
              additionalProperties: false
      responses:
        '201': {description: Project created}
        '403': {description: Role forbidden}
  /v1/api-keys:
    get:
      summary: List personal API keys without secrets
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Personal API keys}
    post:
      summary: Create a personal API key; secret is returned once
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: {type: string, minLength: 1, maxLength: 100}
              additionalProperties: false
      responses:
        '201': {description: API key metadata and one-time secret}
  /v1/api-keys/{api_key_id}:
    delete:
      summary: Revoke an owned personal API key
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: api_key_id, required: true, schema: {type: string}}
      responses:
        '200': {description: Revoked}
        '404': {description: Key not found}
  /v1/api-keys/{api_key_id}/rotate:
    post:
      summary: Atomically replace an owned active personal API key; replacement secret is returned once
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: api_key_id, required: true, schema: {type: string}}
      responses:
        '201': {description: Replacement key metadata and one-time secret; prior key is revoked}
        '404': {description: Active key not found}
  /v1/audit-events:
    get:
      summary: Export organization audit events (owner/admin)
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: query, name: limit, schema: {type: integer, minimum: 1, maximum: 1000, default: 100}}
        - {in: query, name: offset, schema: {type: integer, minimum: 0, default: 0}}
        - {in: query, name: format, schema: {type: string, enum: [json, csv], default: json}}
      responses:
        '200':
          description: Organization-scoped audit page or CSV attachment
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_events: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
                  count: {type: integer}
                  limit: {type: integer}
                  offset: {type: integer}
                  next_offset: {type: integer}
            text/csv:
              schema: {type: string}
        '403': {description: Owner/admin role required}
  /v1/jobs:
    get:
      summary: List jobs
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: query, name: limit, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
        - {in: query, name: offset, schema: {type: integer, minimum: 0, default: 0}}
      responses:
        '200': {description: Paginated jobs}
    post:
      summary: Create challenge job
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, pack_id]
              properties:
                project_id: {type: string}
                pack_id: {type: string}
              additionalProperties: false
      responses:
        '202': {description: Job queued}
        '429': {description: Job quota exceeded}
        '507': {description: Generation paused to preserve disk reserve}
  /v1/jobs/{job_id}:
    parameters:
      - {in: path, name: job_id, required: true, schema: {type: string}}
    get:
      summary: Read job
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Job, content: {application/json: {schema: {$ref: '#/components/schemas/Job'}}}}
        '404': {description: Not found}
    delete:
      summary: Soft-delete non-running job
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Deleted}
        '409': {description: Running job cannot be deleted}
  /v1/jobs/{job_id}/cancel:
    post:
      summary: Cancel queued job
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
      responses:
        '200': {description: Cancelled}
        '409': {description: Invalid state}
  /v1/jobs/{job_id}/retry:
    post:
      summary: Retry failed or cancelled job as a new job
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
      responses:
        '202': {description: New job queued}
        '409': {description: Invalid state}
  /v1/jobs/{job_id}/rebuild:
    post:
      summary: Queue an exact-version rebuild for an expired succeeded job
      description: Uses the immutable pack recipe and SHA-256-addressed historical generator release. A newer generator is never substituted and a package fingerprint mismatch fails the new job.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
      responses:
        '202': {description: Exact-version rebuild queued as a new job}
        '409': {description: Invalid state, recipe unavailable, or historical generator unavailable}
        '507': {description: Rebuild paused to preserve disk reserve}
  /v1/jobs/{job_id}/verification-kit.zip:
    get:
      summary: Download the single generator-free verification kit for a curated or custom job
      description: Returns verification-kit v2. After one unzip it contains the immutable integrity-protected `challenge/`, a role-selected editable `submission/`, exact README command, engineering claim boundary, and normalized challenge metadata. A protocol-v2 package runs `synsigra-verify challenge submission verification-results --force` in package-authoritative evidence mode; a package without protocol v2 uses explicit diagnostic mode and is never evidence-eligible. There is no nested package ZIP and no filename guessing. The kit does not include the generator or verifier wheel. Single byte ranges and browser resume are supported; multipart ranges are rejected. Concurrent first downloads converge on one checksum-addressed cached artifact.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
        - {in: header, name: Range, required: false, schema: {type: string}, example: 'bytes=1048576-'}
      responses:
        '200':
          description: Verification kit ZIP
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            ETag: {schema: {type: string}, description: Stable strong SHA-256 ETag}
            X-Checksum-SHA256: {schema: {type: string, pattern: '^[0-9a-f]{64}$'}}
            X-Artifact-Expires-At: {schema: {type: string, format: date-time}}
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '206': {description: Requested byte range with Content-Range and the immutable artifact headers}
        '416': {description: Invalid, multipart, or unsatisfiable byte range}
        '404': {description: Job or artifact not found}
        '409': {description: Job not succeeded, artifacts expired, or the rendered challenge fails strict v3 integrity/role/contract validation}
        '507': {description: Derived-kit creation paused to preserve disk reserve}
    head:
      summary: Read verification-kit size, checksum, range support, and expiry without a response body
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
      responses:
        '200':
          description: Verification-kit metadata
          headers:
            Content-Length: {schema: {type: integer, format: int64}}
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            ETag: {schema: {type: string}}
            X-Checksum-SHA256: {schema: {type: string, pattern: '^[0-9a-f]{64}$'}}
            X-Artifact-Expires-At: {schema: {type: string, format: date-time}}
  /v1/jobs/{job_id}/viewer:
    get:
      summary: Describe cases and channels available to the signal viewer
      description: Metadata only. The browser fetches signal values separately for the visible viewport, so opening this resource does not download the waveform.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
      responses:
        '200':
          description: Retained viewer source metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SignalViewerSource'}
        '401': {description: Unauthorized}
        '404': {description: Job or retained artifact not found, including cross-organization access}
        '409': {description: Job not completed, artifact expired, or no supported WFDB data is available}
  /v1/jobs/{job_id}/viewer/window:
    get:
      summary: Read a bounded binary signal viewport
      description: Returns only selected channels for the requested time range. At close zoom it reads raw signed 16-bit WFDB samples; at wider zoom it returns exact min/max buckets from a prepared power-of-two pyramid. Response size is bounded by points and channel count, independently of the complete signal file size. HTTP request/response is intentional; clients should cancel obsolete requests while panning instead of opening a WebSocket.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
        - {in: query, name: case_id, required: true, schema: {type: string}}
        - {in: query, name: start_sample, required: false, schema: {type: integer, format: int64, minimum: 0, default: 0}}
        - {in: query, name: sample_count, required: true, schema: {type: integer, format: int64, minimum: 1}}
        - {in: query, name: points, required: false, schema: {type: integer, minimum: 1, maximum: 16384, default: 2048}}
        - in: query
          name: channels
          required: true
          description: Unique zero-based channel indices joined by commas, for example `0,2,3`.
          schema: {type: string}
      responses:
        '200':
          description: Binary v1 viewport. The 80-byte little-endian header contains magic `SYNSIGV1`, version/header/flags, channel and bucket counts, requested start/span, returned data start, samples per bucket, source length, sample rate, and payload offset. It is followed by uint32 channel indices and channel-major int16 min/max pairs.
          content:
            application/vnd.synsigra.signal-window.v1:
              schema: {type: string, format: binary}
        '400': {description: Invalid range, case, points, or channel selection}
        '401': {description: Unauthorized}
        '404': {description: Job or retained artifact not found, including cross-organization access}
        '409': {description: Viewer source unavailable or invalid}
        '503': {description: Viewer source temporarily unreadable}
  /v1/jobs/{job_id}/viewer/overlays:
    get:
      summary: Read bounded ground-truth overlays for a signal viewport
      description: Reads the generator's authoritative R peaks, ECG beat classes, lead-specific ECG delineation fiducials, PPG onset/peak fiducials, artifacts, clinical episodes, low-perfusion pulses, and expected missing-pulse intervals from a prepared read-only index. Only items intersecting the requested sample range are read. Dense point streams are clustered to keep the JSON response within max_items; intervals remain explicit.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: job_id, required: true, schema: {type: string}}
        - {in: query, name: case_id, required: true, schema: {type: string}}
        - {in: query, name: start_sample, required: false, schema: {type: integer, format: int64, minimum: 0, default: 0}}
        - {in: query, name: sample_count, required: true, schema: {type: integer, format: int64, minimum: 1}}
        - {in: query, name: max_items, required: false, schema: {type: integer, minimum: 1, maximum: 10000, default: 4000}}
      responses:
        '200':
          description: Time-window-bounded overlay items and available overlay kinds. A count greater than one denotes a clustered point marker spanning start_sample through end_sample.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SignalViewerOverlayWindow'}
        '400': {description: Invalid range, case, or item bound}
        '401': {description: Unauthorized}
        '404': {description: Job or retained artifact not found, including cross-organization access}
        '409': {description: Overlay index unavailable or invalid}
        '503': {description: Overlay source temporarily unreadable}
  /v1/artifacts/{package_id}/{filename}:
    get:
      summary: Download immutable manifest or ZIP
      description: Streams the retained immutable file. package.zip supports single byte ranges and browser resume without buffering the artifact in an Apache worker.
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: package_id, required: true, schema: {type: string}}
        - {in: path, name: filename, required: true, schema: {type: string, enum: [manifest.json, package.zip]}}
        - {in: header, name: Range, required: false, schema: {type: string}, example: 'bytes=0-1048575'}
      responses:
        '200':
          description: Artifact bytes
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            ETag: {schema: {type: string}}
            X-Checksum-SHA256: {schema: {type: string, pattern: '^[0-9a-f]{64}$'}}
            X-Artifact-Expires-At: {schema: {type: string, format: date-time}}
        '206': {description: Requested byte range with Content-Range}
        '416': {description: Invalid, multipart, or unsatisfiable byte range}
        '404': {description: Missing, expired, or cross-tenant artifact}
    head:
      summary: Read immutable artifact delivery metadata without a response body
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {in: path, name: package_id, required: true, schema: {type: string}}
        - {in: path, name: filename, required: true, schema: {type: string, enum: [manifest.json, package.zip]}}
      responses:
        '200':
          description: Artifact metadata
          headers:
            Content-Length: {schema: {type: integer, format: int64}}
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            ETag: {schema: {type: string}}
            X-Checksum-SHA256: {schema: {type: string, pattern: '^[0-9a-f]{64}$'}}
            X-Artifact-Expires-At: {schema: {type: string, format: date-time}}
  /v1/usage:
    get:
      summary: Caller usage and limits
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Usage summary}
  /v1/metrics:
    get:
      summary: Owner/admin operational metrics
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Operational counters and worker heartbeat}
        '403': {description: Role forbidden}
  /v1/scenarios:
    get:
      summary: List caller-owned scenario drafts
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Scenario draft list including saved target_intent values}
    post:
      summary: Validate and create an editable scenario draft
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scenario, target_intent]
              properties:
                name: {type: string, maxLength: 100}
                scenario: {type: object}
                target_intent:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items: {type: string}
                  description: User-selected verification goals inherited by custom pack composition.
              additionalProperties: false
      responses:
        '201': {description: Valid draft saved with fingerprint}
        '422': {description: Invalid draft saved with actionable validation errors}
  /v1/scenarios/{scenario_id}:
    parameters:
      - {in: path, name: scenario_id, required: true, schema: {type: string}}
    get:
      summary: Read caller-owned scenario draft
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Scenario draft}
        '404': {description: Missing or owned by another user}
    put:
      summary: Replace and revalidate scenario draft
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scenario, target_intent]
              properties:
                name: {type: string, maxLength: 100}
                scenario: {type: object}
                target_intent:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items: {type: string}
              additionalProperties: false
      responses:
        '200': {description: Valid draft updated}
        '422': {description: Invalid draft updated with validation errors}
    delete:
      summary: Delete scenario draft
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Draft deleted}
        '404': {description: Missing or owned by another user}
  /v1/custom-packs:
    get:
      summary: List caller-owned immutable custom packs
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Custom pack list}
    post:
      summary: Compose a custom pack from valid owned scenario drafts
      security: [{cookieAuth: []}, {bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description, targets, scenario_ids]
              properties:
                name: {type: string, maxLength: 100}
                description: {type: string}
                targets: {type: array, minItems: 1, items: {type: string}}
                scenario_ids: {type: array, minItems: 1, items: {type: string}}
              additionalProperties: false
      responses:
        '201': {description: Immutable custom pack created}
        '400': {description: Invalid, duplicate, non-owned, or invalid-status draft}
        '422': {description: Core pack analysis rejected one or more scenario-target combinations}
  /v1/custom-packs/{pack_id}:
    parameters:
      - {in: path, name: pack_id, required: true, schema: {type: string}}
    get:
      summary: Read caller-owned custom pack
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Custom pack}
        '404': {description: Missing or owned by another user}
    delete:
      summary: Hide custom pack while retaining immutable job snapshots
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Custom pack deleted}
        '404': {description: Missing or owned by another user}
