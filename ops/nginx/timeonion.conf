limit_req_zone $binary_remote_addr zone=timeonion_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=timeonion_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=timeonion_connections:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/timeonion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timeonion.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name timeonion.com www.timeonion.com;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/local/apache2/htdocs/frontend;
        default_type text/plain;
    }

    location / {
        return 301 https://www.timeonion.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name timeonion.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/timeonion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timeonion.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 301 https://www.timeonion.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.timeonion.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/timeonion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timeonion.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;

    client_max_body_size 1m;
    limit_conn timeonion_connections 30;

    location ~ ^/syn_sig_ra/v1/auth/(login|register)$ {
        limit_req zone=timeonion_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        limit_req zone=timeonion_per_ip burst=60 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}
